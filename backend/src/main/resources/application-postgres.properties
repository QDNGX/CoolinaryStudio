# Профиль `postgres`: активировать через SPRING_PROFILES_ACTIVE=postgres.
# В Docker Postgres поднимает корневой docker-compose.yml. При ручном запуске profile может
# подключаться к локальному Postgres на localhost:5432 с теми же dev-реквизитами.

spring.docker.compose.enabled=false

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/projectcooking}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:projectcooking}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:projectcooking}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# H2-консоль в postgres-профиле не нужна
spring.h2.console.enabled=false
