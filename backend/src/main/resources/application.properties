spring.application.name=ProjectCooking

# --- API base path (совпадает с server url контракта: http://localhost:8080/api) ---
server.servlet.context-path=/api

# --- Профиль по умолчанию: H2 in-memory (запуск без Docker). Postgres — профиль `postgres`. ---
# Не поднимаем docker-compose в дефолтном (H2) профиле.
spring.docker.compose.enabled=false

# --- Datasource: H2 in-memory ---
spring.datasource.url=jdbc:h2:mem:chefstol;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- H2 web console: http://localhost:8080/api/h2-console ---
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# REST-API без серверных шаблонов — не ищем каталог Thymeleaf
spring.thymeleaf.check-template-location=false

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
# spring.jpa.show-sql=true

# Jackson 3 (Spring Boot 4) по умолчанию пишет даты в ISO-8601 и включает null-поля —
# контракт этого и ожидает, отдельная настройка не нужна.
