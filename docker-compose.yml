services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: projectcooking
      POSTGRES_USER: projectcooking
      POSTGRES_PASSWORD: projectcooking
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U projectcooking -d projectcooking"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/projectcooking
      SPRING_DATASOURCE_USERNAME: projectcooking
      SPRING_DATASOURCE_PASSWORD: projectcooking
      JAVA_OPTS: -XX:MaxRAMPercentage=75
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres-data:
